<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="Ozempic comparison chart">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1d4ed8"/>
    </linearGradient>
    <style>
      .title { font: 700 54px Arial, sans-serif; fill: #ffffff; }
      .subtitle { font: 400 24px Arial, sans-serif; fill: #bfdbfe; }
      .label { font: 700 22px Arial, sans-serif; fill: #e2e8f0; }
      .value { font: 700 20px Arial, sans-serif; fill: #ffffff; }
    </style>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)" rx="24"/>
  <text x="60" y="95" class="title">Ozempic: Quick Visual Comparison</text>
  <text x="60" y="130" class="subtitle">Educational infographic for diabetes and weight-management discussion</text>

  <text x="60" y="200" class="label">Ozempic (Semaglutide)</text>
  <rect x="60" y="220" width="900" height="32" rx="8" fill="#38bdf8"/>
  <text x="980" y="243" class="value">High average response</text>

  <text x="60" y="300" class="label">Wegovy (Semaglutide)</text>
  <rect x="60" y="320" width="980" height="32" rx="8" fill="#22d3ee"/>
  <text x="1060" y="343" class="value">Higher obesity-dose path</text>

  <text x="60" y="400" class="label">Mounjaro (Tirzepatide)</text>
  <rect x="60" y="420" width="1040" height="32" rx="8" fill="#34d399"/>
  <text x="1110" y="443" class="value">Dual-pathway option</text>

  <text x="60" y="500" class="label">Metformin (Oral)</text>
  <rect x="60" y="520" width="540" height="32" rx="8" fill="#93c5fd"/>
  <text x="620" y="543" class="value">Foundational first-line</text>
</svg>
